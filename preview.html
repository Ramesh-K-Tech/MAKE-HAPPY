<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Bouquet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Tenor+Sans&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/preview.css"/>
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <a href="index.html" class="site-title">MAKE HAPPY</a>
  </header>

  <!-- Main -->
  <main class="preview-wrapper">

    <!-- Title -->
    <p class="preview-title">Customize your bouquet</p>

    <!-- Action Buttons -->
    <div class="preview-actions">
      <button class="btn btn-filled" onclick="newArrangement()">Try a New Arrangement</button>
      <button class="btn btn-outline" onclick="changeGreenery()">Change Greenery</button>
    </div>

    <!-- Bouquet Display -->
    <div class="bouquet-display" id="bouquetDisplay">

      <!-- Bush layer (behind flowers) -->
      <div class="bush-layer" id="bushLayer"></div>

      <!-- Flowers layer (on top of bush) -->
      <div class="flowers-layer" id="flowersLayer"></div>

    </div>

  </main>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="bouquet.html" class="btn btn-outline">Back</a>
    <button class="btn btn-filled" onclick="goToMessage()">Next</button>
  </div>

  <script src="js/preview.js"></script>

</body>
</html>
