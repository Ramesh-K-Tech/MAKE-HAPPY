<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Bouquet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/share.css"/>
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <a href="index.html" class="site-title">MAKE HAPPY</a>
  </header>

  <!-- Main -->
  <main class="share-wrapper">


    <!-- Bouquet Display -->
    <div class="bouquet-display" id="bouquetDisplay">
      <div class="bush-layer"    id="bushLayer"></div>
      <div class="flowers-layer" id="flowersLayer"></div>
    </div>
     <!-- To / From -->
    <div class="share-dedication" id="shareDedication">
      <!-- Injected by JS -->
    </div>
     <div class="share-message" id="shareMessage">
      <!-- Injected by JS -->
    </div>

    <!-- Copy Link Button -->
    <div class="share-actions">
      <button class="btn btn-filled" onclick="copyLink()">
        Copy Link to Share
      </button>
      <p class="share-copied" id="copiedMsg">Link copied! 🌸</p>
    </div>

  </main>

  <script src="js/share.js"></script>

</body>
</html>
